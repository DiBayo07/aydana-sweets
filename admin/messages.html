<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Сообщения | Айдана Sweets Админ</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="admin.css">
</head>
<body>
  <div class="admin-body">
    <aside class="admin-sidebar">
      <div class="admin-sidebar-header">
        <h2><i class="fas fa-candy-cane"></i> Айдана Sweets</h2>
        <p>Админ-панель</p>
      </div>
      <nav class="admin-sidebar-menu">
        <a href="dashboard.html" class="admin-menu-item"><i class="fas fa-tachometer-alt"></i> Дашборд</a>
        <a href="products.html" class="admin-menu-item"><i class="fas fa-chocolate-bar"></i> Товары</a>
        <a href="messages.html" class="admin-menu-item active"><i class="fas fa-envelope"></i> Сообщения</a>
        <a href="../index.html" class="admin-menu-item"><i class="fas fa-store"></i> На сайт</a>
        <a href="#" class="admin-menu-item" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> Выход</a>
      </nav>
    </aside>

    <main class="admin-main">
      <header class="admin-header">
        <h1><i class="fas fa-envelope"></i> Сообщения от клиентов</h1>
      </header>

      <div id="result"></div>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="../js/config.js"></script>
  <script>
    if (sessionStorage.getItem('admin_logged_in') !== '1') {
      window.location.href = 'login.html';
    }

    const supabase = window.supabase.createClient(
      window.SUPABASE_URL,
      window.SUPABASE_ANON_KEY
    );

    function escapeHtml(str) {
      if (!str) return '';
      return String(str).replace(/[&<>]/g, (m) => {
        if (m === '&') return '&amp;';
        if (m === '<') return '&lt;';
        if (m === '>') return '&gt;';
        return m;
      });
    }

    async function load() {
      const result = document.getElementById('result');
      result.innerHTML = '<div class="admin-alert">⏳ Загрузка сообщений...</div>';

      try {
        const { data, error } = await supabase
          .from('messages')
          .select('*')
          .order('created_at', { ascending: false });

        if (error) throw error;

        if (!data || data.length === 0) {
          result.innerHTML = '<div class="admin-alert">📭 Пока нет сообщений от клиентов</div>';
          return;
        }

        let html = `
          <div class="admin-table-container">
            <table class="admin-table">
              <thead>
                <tr>
                  <th>Дата</th>
                  <th>Имя</th>
                  <th>Email</th>
                  <th>Сообщение</th>
                  <th>Действия</th>
                </tr>
              </thead>
              <tbody>
        `;

        for (const msg of data) {
          html += `
            <tr>
              <td>${new Date(msg.created_at).toLocaleString('ru-RU')}</td>
              <td>${escapeHtml(msg.name)}</td>
              <td><a href="mailto:${escapeHtml(msg.email)}">${escapeHtml(msg.email)}</a></td>
              <td>${escapeHtml(msg.message)}</td>
              <td>
                <button class="btn btn-danger" type="button" onclick="deleteMsg(${msg.id})">
                  <i class="fas fa-trash"></i> Удалить
                </button>
              </td>
            </tr>
          `;
        }

        html += '</tbody></table></div>';
        result.innerHTML = html;
      } catch (err) {
        result.innerHTML = `<div class="admin-alert admin-alert-error">❌ Ошибка: ${escapeHtml(err.message)}</div>`;
        console.error(err);
      }
    }

    window.deleteMsg = async function deleteMsg(id) {
      if (!confirm('Удалить это сообщение?')) return;

      const { error } = await supabase.from('messages').delete().eq('id', id);
      if (error) {
        alert('Не удалось удалить: ' + error.message);
        return;
      }
      load();
    };

    document.getElementById('logoutBtn').addEventListener('click', (e) => {
      e.preventDefault();
      sessionStorage.removeItem('admin_logged_in');
      window.location.href = 'login.html';
    });

    load();
  </script>
</body>
</html>
