<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Сообщения | Айдана Sweets Админ</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="admin.css">
</head>
<body>
    <div class="admin-body">
        <div class="admin-sidebar">
            <div class="admin-sidebar-header">
                <h2><i class="fas fa-candy-cane"></i> Айдана Sweets</h2>
                <p>Админ-панель</p>
            </div>
            <div class="admin-sidebar-menu">
                <a href="dashboard.html" class="admin-menu-item"><i class="fas fa-tachometer-alt"></i> Дашборд</a>
                <a href="products.html" class="admin-menu-item"><i class="fas fa-chocolate-bar"></i> Товары</a>
                <a href="orders.html" class="admin-menu-item"><i class="fas fa-shopping-cart"></i> Заказы</a>
                <a href="messages.html" class="admin-menu-item active"><i class="fas fa-envelope"></i> Сообщения</a>
                <a href="#" class="admin-menu-item" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> Выход</a>
            </div>
        </div>

        <div class="admin-main">
            <div class="admin-header">
                <h1><i class="fas fa-envelope"></i> Сообщения от клиентов</h1>
            </div>

            <div class="admin-table-container">
                <div id="loading" style="text-align:center; padding:40px;">
                    <div class="spinner"></div>
                    <p>Загрузка сообщений...</p>
                </div>
                <div id="errorMsg" style="display:none; background:#f8d7da; color:#721c24; padding:15px; border-radius:8px; margin:20px;"></div>
                <table class="admin-table" id="messagesTable" style="display:none;">
                    <thead>
                        <tr>
                            <th>Дата</th>
                            <th>Имя</th>
                            <th>Email</th>
                            <th>Сообщение</th>
                            <th>Действия</th>
                        </tr>
                    </thead>
                    <tbody id="messagesBody"></tbody>
                </table>
            </div>
        </div>
    </div>

    <style>
        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid #F0E6CC;
            border-top-color: #C4873A;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 15px;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../js/config.js"></script>
    <script src="../js/supabase-client.js"></script>
    <script>
        // Проверка авторизации
        if (!sessionStorage.getItem('admin_logged_in')) {
            window.location.href = 'login.html';
        }

        async function loadMessages() {
            const loading = document.getElementById('loading');
            const table = document.getElementById('messagesTable');
            const tbody = document.getElementById('messagesBody');
            const errorDiv = document.getElementById('errorMsg');
            
            try {
                console.log('Загружаем сообщения через fetchMessages...');
                
                // Используем функцию из supabase-client.js
                const messages = await window.fetchMessages();
                
                console.log('Получено сообщений:', messages.length);
                
                loading.style.display = 'none';
                table.style.display = 'table';
                
                if (!messages || messages.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="5" style="text-align:center">📭 Нет сообщений от клиентов</td></tr>';
                    return;
                }
                
                tbody.innerHTML = messages.map(msg => `
                    <tr>
                        <td style="white-space:nowrap;">${new Date(msg.created_at).toLocaleString()}</td>
                        <td><strong>${escapeHtml(msg.name)}</strong></td>
                        <td>${escapeHtml(msg.email)}</td>
                        <td style="max-width:400px; white-space:normal; word-break:break-word;">${escapeHtml(msg.message)}</td>
                        <td>
                            <button class="admin-btn admin-btn-delete" onclick="deleteMessage(${msg.id})">🗑️ Удалить</button>
                        </td>
                    </tr>
                `).join('');
                
            } catch (err) {
                console.error('Ошибка загрузки:', err);
                loading.style.display = 'none';
                errorDiv.style.display = 'block';
                errorDiv.innerHTML = `<strong>❌ Ошибка загрузки сообщений:</strong> ${err.message}<br><br>
                    🔧 Решение:<br>
                    1. Выполните SQL в Supabase SQL Editor (создать таблицу messages)<br>
                    2. Проверьте, что таблица messages существует в Supabase Table Editor<br>
                    3. Проверьте RLS политики`;
            }
        }
        
        function escapeHtml(str) {
            if (!str) return '';
            return str
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;');
        }
        
        async function deleteMessage(id) {
            if (!confirm('Удалить это сообщение?')) return;
            try {
                // Используем Supabase напрямую для удаления
                const supabase = window.supabase.createClient(
                    window.SUPABASE_URL,
                    window.SUPABASE_ANON_KEY
                );
                const { error } = await supabase.from('messages').delete().eq('id', id);
                if (error) throw error;
                loadMessages(); // Перезагружаем список
            } catch (err) {
                alert('Ошибка удаления: ' + err.message);
            }
        }
        
        document.getElementById('logoutBtn').addEventListener('click', (e) => {
            e.preventDefault();
            sessionStorage.removeItem('admin_logged_in');
            window.location.href = 'login.html';
        });
        
        // Загружаем сообщения
        loadMessages();
    </script>
</body>
</html>
