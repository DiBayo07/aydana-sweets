<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Сообщения | Айдана Sweets</title>
    <link rel="stylesheet" href="admin.css">
    <style>
        .admin-body { display: flex; min-height: 100vh; }
        .admin-sidebar { width: 260px; background: #2C1810; color: white; }
        .admin-sidebar-header { padding: 20px; text-align: center; border-bottom: 1px solid #4a2e22; }
        .admin-sidebar-menu a { display: block; padding: 12px 20px; color: #F5ECD7; text-decoration: none; }
        .admin-sidebar-menu a:hover, .admin-sidebar-menu a.active { background: #C4873A; }
        .admin-main { flex: 1; padding: 20px; background: #FAF6EE; }
        .admin-header { background: white; padding: 20px; border-radius: 12px; margin-bottom: 20px; }
        .admin-table-container { background: white; border-radius: 12px; padding: 20px; }
        .admin-table { width: 100%; border-collapse: collapse; }
        .admin-table th, .admin-table td { padding: 12px; text-align: left; border-bottom: 1px solid #F0E6CC; }
        .admin-table th { background: #F5ECD7; }
        .admin-btn-delete { background: #C0392B; color: white; border: none; padding: 5px 12px; border-radius: 6px; cursor: pointer; }
        .spinner { width: 40px; height: 40px; border: 3px solid #F0E6CC; border-top-color: #C4873A; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 15px; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .loading { text-align: center; padding: 40px; }
    </style>
</head>
<body>
    <div class="admin-body">
        <div class="admin-sidebar">
            <div class="admin-sidebar-header">
                <h2>🍫 Айдана Sweets</h2>
                <p>Админ-панель</p>
            </div>
            <div class="admin-sidebar-menu">
                <a href="dashboard.html">📊 Дашборд</a>
                <a href="products.html">🍫 Товары</a>
                <a href="orders.html">📦 Заказы</a>
                <a href="messages.html" class="active">✉️ Сообщения</a>
                <a href="#" id="logoutBtn">🚪 Выход</a>
            </div>
        </div>

        <div class="admin-main">
            <div class="admin-header">
                <h1>✉️ Сообщения от клиентов</h1>
            </div>

            <div class="admin-table-container">
                <div id="loading" class="loading">
                    <div class="spinner"></div>
                    <p>Загрузка сообщений...</p>
                </div>
                <div id="errorMsg" style="display:none; background:#f8d7da; color:#721c24; padding:15px; border-radius:8px; margin-bottom:20px;"></div>
                <table class="admin-table" id="messagesTable" style="display:none;">
                    <thead>
                        <tr><th>Дата</th><th>Имя</th><th>Email</th><th>Сообщение</th><th>Действия</th></tr>
                    </thead>
                    <tbody id="messagesBody"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../js/config.js"></script>
    <script>
        // Проверка авторизации
        if (!sessionStorage.getItem('admin_logged_in')) {
            window.location.href = 'login.html';
        }

        const supabase = window.supabase.createClient(
            window.SUPABASE_URL,
            window.SUPABASE_ANON_KEY
        );

        async function loadMessages() {
            const loading = document.getElementById('loading');
            const table = document.getElementById('messagesTable');
            const tbody = document.getElementById('messagesBody');
            const errorMsg = document.getElementById('errorMsg');
            
            try {
                console.log('Загружаем сообщения...');
                
                const { data, error } = await supabase
                    .from('messages')
                    .select('*')
                    .order('created_at', { ascending: false });
                
                if (error) throw error;
                
                loading.style.display = 'none';
                table.style.display = 'table';
                errorMsg.style.display = 'none';
                
                console.log('Получено сообщений:', data?.length);
                
                if (!data || data.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="5" style="text-align:center">📭 Нет сообщений от клиентов</td></tr>';
                    return;
                }
                
                tbody.innerHTML = data.map(msg => `
                    <tr>
                        <td style="white-space:nowrap;">${new Date(msg.created_at).toLocaleString()}</td>
                        <td><strong>${escapeHtml(msg.name)}</strong></td>
                        <td>${escapeHtml(msg.email)}</td>
                        <td style="max-width:400px; word-break:break-word;">${escapeHtml(msg.message)}</td>
                        <td><button class="admin-btn-delete" onclick="deleteMessage(${msg.id})">🗑️ Удалить</button></td>
                    </tr>
                `).join('');
                
            } catch (err) {
                console.error('Ошибка:', err);
                loading.style.display = 'none';
                errorMsg.style.display = 'block';
                errorMsg.innerHTML = '❌ Ошибка загрузки: ' + err.message;
            }
        }
        
        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }
        
        async function deleteMessage(id) {
            if (!confirm('Удалить сообщение?')) return;
            try {
                const { error } = await supabase.from('messages').delete().eq('id', id);
                if (error) throw error;
                loadMessages();
            } catch (err) {
                alert('Ошибка: ' + err.message);
            }
        }
        
        document.getElementById('logoutBtn').addEventListener('click', (e) => {
            e.preventDefault();
            sessionStorage.removeItem('admin_logged_in');
            window.location.href = 'login.html';
        });
        
        loadMessages();
    </script>
</body>
</html>
