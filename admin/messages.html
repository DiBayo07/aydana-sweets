<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Сообщения | Айдана Sweets</title>
    <style>
        body { font-family: sans-serif; margin: 0; display: flex; }
        .sidebar { width: 250px; background: #2C1810; color: white; min-height: 100vh; }
        .sidebar a { display: block; padding: 12px 20px; color: #F5ECD7; text-decoration: none; }
        .sidebar a.active { background: #C4873A; }
        .content { flex: 1; padding: 20px; background: #FAF6EE; }
        table { width: 100%; background: white; border-collapse: collapse; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #ddd; }
        th { background: #F5ECD7; }
        button { background: #C0392B; color: white; border: none; padding: 5px 10px; border-radius: 5px; cursor: pointer; }
        .loading { text-align: center; padding: 40px; }
        .error { background: #f8d7da; color: #721c24; padding: 15px; margin-bottom: 20px; border-radius: 8px; }
    </style>
</head>
<body>
    <div class="sidebar">
        <div style="padding: 20px; text-align: center; border-bottom: 1px solid #4a2e22;">
            <h2>🍫 Айдана Sweets</h2>
        </div>
        <a href="dashboard.html">📊 Дашборд</a>
        <a href="products.html">🍫 Товары</a>
        <a href="orders.html">📦 Заказы</a>
        <a href="messages.html" class="active">✉️ Сообщения</a>
        <a href="#" id="logoutBtn">🚪 Выход</a>
    </div>

    <div class="content">
        <h1>✉️ Сообщения от клиентов</h1>
        <div id="result"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../js/config.js"></script>
    <script>
        if (!sessionStorage.getItem('admin_logged_in')) {
            window.location.href = 'login.html';
        }

        const supabase = window.supabase.createClient(
            window.SUPABASE_URL,
            window.SUPABASE_ANON_KEY
        );

        async function load() {
            const result = document.getElementById('result');
            result.innerHTML = '<div class="loading">⏳ Загрузка...</div>';
            
            try {
                const { data, error } = await supabase
                    .from('messages')
                    .select('*')
                    .order('created_at', { ascending: false });
                
                if (error) throw error;
                
                if (!data || data.length === 0) {
                    result.innerHTML = '<div class="error">📭 Нет сообщений</div>';
                    return;
                }
                
                let html = '<table><thead><tr><th>Дата</th><th>Имя</th><th>Email</th><th>Сообщение</th><th></th></tr></thead><tbody>';
                for (let msg of data) {
                    html += `
                        <tr>
                            <td>${new Date(msg.created_at).toLocaleString()}</td>
                            <td>${escapeHtml(msg.name)}</td>
                            <td>${escapeHtml(msg.email)}</td>
                            <td>${escapeHtml(msg.message)}</td>
                            <td><button onclick="deleteMsg(${msg.id})">Удалить</button></td>
                        </tr>
                    `;
                }
                html += '</tbody></table>';
                result.innerHTML = html;
                
            } catch (err) {
                result.innerHTML = `<div class="error">❌ Ошибка: ${err.message}</div>`;
                console.error(err);
            }
        }
        
        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }
        
        window.deleteMsg = async function(id) {
            if (!confirm('Удалить сообщение?')) return;
            await supabase.from('messages').delete().eq('id', id);
            load();
        };
        
        document.getElementById('logoutBtn').onclick = () => {
            sessionStorage.removeItem('admin_logged_in');
            window.location.href = 'login.html';
        };
        
        load();
    </script>
</body>
</html>
