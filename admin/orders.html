<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Заказы | Айдана Sweets Админ</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700;900&family=Nunito:wght@300;400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="admin.css">
</head>
<body>
  <div class="admin-body">
    <aside class="admin-sidebar">
      <div class="admin-sidebar-header">
        <h2><i class="fas fa-candy-cane"></i> Айдана Sweets</h2>
        <p>Админ-панель</p>
      </div>
      <nav class="admin-sidebar-menu">
        <a href="dashboard.html" class="admin-menu-item">
          <i class="fas fa-tachometer-alt"></i> Дашборд
        </a>
        <a href="products.html" class="admin-menu-item">
          <i class="fas fa-chocolate-bar"></i> Товары
        </a>
        <a href="orders.html" class="admin-menu-item active">
          <i class="fas fa-shopping-cart"></i> Заказы
        </a>
        <a href="messages.html" class="admin-menu-item">
          <i class="fas fa-envelope"></i> Сообщения
        </a>
        <a href="../index.html" class="admin-menu-item">
          <i class="fas fa-store"></i> На сайт
        </a>
        <a href="#" class="admin-menu-item" id="logoutBtn">
          <i class="fas fa-sign-out-alt"></i> Выход
        </a>
      </nav>
    </aside>

    <div class="admin-main">
      <div class="admin-header">
        <h1><i class="fas fa-shopping-cart"></i> Заказы</h1>
      </div>

      <div class="admin-table-container">
        <table class="admin-table">
          <thead>
            <tr>
              <th>№</th>
              <th>Покупатель</th>
              <th>Телефон</th>
              <th>Сумма</th>
              <th>Дата</th>
              <th>Статус</th>
              <th>Действия</th>
            </tr>
          </thead>
          <tbody id="ordersBody">
            <tr><td colspan="7" style="text-align:center;">Загрузка...</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="../js/config.js?v=2"></script>
  <script>
    const supabase = window.supabase.createClient(window.SUPABASE_URL, window.SUPABASE_ANON_KEY);

    if (!sessionStorage.getItem('admin_logged_in')) {
      window.location.href = 'login.html';
    }

    document.getElementById('logoutBtn').addEventListener('click', (e) => {
      e.preventDefault();
      sessionStorage.removeItem('admin_logged_in');
      window.location.href = 'login.html';
    });

    const STATUS_LABELS = {
      new: '🆕 Новый',
      processing: '⚙️ В обработке',
      done: '✅ Доставлен',
      cancelled: '❌ Отменён'
    };

    async function loadOrders() {
      const tbody = document.getElementById('ordersBody');
      try {
        const { data, error } = await supabase
          .from('orders')
          .select('*')
          .order('created_at', { ascending: false });
        if (error) throw error;

        const orders = data || [];
        if (!orders.length) {
          tbody.innerHTML = '<tr><td colspan="7" style="text-align:center;">Нет заказов</td></tr>';
          return;
        }

        tbody.innerHTML = orders.map(o => `
          <tr>
            <td><strong>#${o.id}</strong></td>
            <td>${o.customer || '—'}</td>
            <td>${o.phone || '—'}</td>
            <td>${o.total || 0} сом</td>
            <td>${o.created_at ? new Date(o.created_at).toLocaleString() : '—'}</td>
            <td>
              <select class="order-status-select" onchange="updateStatus(${o.id}, this.value)">
                <option value="new" ${o.status === 'new' ? 'selected' : ''}>${STATUS_LABELS.new}</option>
                <option value="processing" ${o.status === 'processing' ? 'selected' : ''}>${STATUS_LABELS.processing}</option>
                <option value="done" ${o.status === 'done' ? 'selected' : ''}>${STATUS_LABELS.done}</option>
                <option value="cancelled" ${o.status === 'cancelled' ? 'selected' : ''}>${STATUS_LABELS.cancelled}</option>
              </select>
            </td>
            <td class="admin-actions">
              <button class="admin-btn admin-btn-delete" onclick="deleteOrder(${o.id})">🗑️</button>
            </td>
          </tr>
        `).join('');
      } catch (err) {
        console.error(err);
        tbody.innerHTML = '<tr><td colspan="7" style="text-align:center;color:var(--admin-danger);font-weight:700;">❌ Ошибка загрузки заказов из Supabase</td></tr>';
      }
    }

    async function updateStatus(id, status) {
      try {
        const { error } = await supabase.from('orders').update({ status }).eq('id', id);
        if (error) throw error;
      } catch (err) {
        console.error(err);
        alert('Ошибка обновления статуса');
      }
    }

    async function deleteOrder(id) {
      if (!confirm('Удалить заказ?')) return;
      try {
        const { error } = await supabase.from('orders').delete().eq('id', id);
        if (error) throw error;
        await loadOrders();
      } catch (err) {
        console.error(err);
        alert('Ошибка удаления');
      }
    }

    loadOrders();
  </script>
</body>
</html>
