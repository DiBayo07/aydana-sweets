<!DOCTYPE html>
<html lang="ru">
<head>

  <link rel="stylesheet" href="admin.css">
</head>
<body>
  <div class="admin-body">
    <div class="admin-sidebar-overlay" id="adminSidebarOverlay"></div>

    <aside class="admin-sidebar">
      <div class="admin-sidebar-header">
        <h2><i class="fas fa-candy-cane"></i> Айдана Sweets</h2>
        <p>Админ-панель</p>
      </div>
      <nav class="admin-sidebar-menu">
        <a href="dashboard.html" class="admin-menu-item">
          <i class="fas fa-tachometer-alt"></i> Дашборд
        </a>
        <a href="products.html" class="admin-menu-item">
          <i class="fas fa-chocolate-bar"></i> Товары
        </a>
        <a href="orders.html" class="admin-menu-item active">
          <i class="fas fa-shopping-cart"></i> Заказы
        </a>
        <a href="messages.html" class="admin-menu-item">
          <i class="fas fa-envelope"></i> Сообщения
        </a>
        <a href="../index.html" class="admin-menu-item">
          <i class="fas fa-store"></i> На сайт
        </a>
        <a href="#" class="admin-menu-item" id="logoutBtn">
          <i class="fas fa-sign-out-alt"></i> Выход
        </a>
      </nav>
    </aside>

    <main class="admin-main">
      <header class="admin-header">
        <div class="admin-header-left">
          <button class="admin-menu-toggle" id="adminMenuToggle" type="button" aria-label="Открыть меню">
            <i class="fas fa-bars"></i>
          </button>
          <h1><i class="fas fa-shopping-cart"></i> Заказы</h1>
        </div>
      </header>

      <div class="admin-table-container">
        <table class="admin-table admin-table-responsive">
          <thead>
            <tr>
              <th>№</th>
              <th>Покупатель</th>
              <th>Телефон</th>
              <th>Сумма</th>
              <th>Дата</th>
              <th>Статус</th>
              <th>Действия</th>
            </tr>
          </thead>
          <tbody id="ordersBody">
            <tr><td colspan="7" style="text-align:center;">Загрузка...</td></tr>
          </tbody>
        </table>
      </div>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
