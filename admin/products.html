<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Товары | Айдана Sweets Админ</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="admin.css">
</head>
<body>
  <div class="admin-body">
    <aside class="admin-sidebar">
      <div class="admin-sidebar-header">
        <h2><i class="fas fa-candy-cane"></i> Айдана Sweets</h2>
        <p>Админ-панель</p>
      </div>
      <nav class="admin-sidebar-menu">
        <a href="dashboard.html" class="admin-menu-item"><i class="fas fa-tachometer-alt"></i> Дашборд</a>
        <a href="products.html" class="admin-menu-item active"><i class="fas fa-chocolate-bar"></i> Товары</a>
        <a href="orders.html" class="admin-menu-item"><i class="fas fa-shopping-cart"></i> Заказы</a>
        <a href="messages.html" class="admin-menu-item"><i class="fas fa-envelope"></i> Сообщения</a>
        <a href="../index.html" class="admin-menu-item"><i class="fas fa-store"></i> На сайт</a>
        <a href="#" class="admin-menu-item" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> Выход</a>
      </nav>
    </aside>

    <main class="admin-main">
      <header class="admin-header">
        <h1><i class="fas fa-chocolate-bar"></i> Управление товарами</h1>
        <button class="btn btn-primary" type="button" onclick="showAddProductModal()">
          <i class="fas fa-plus"></i> Добавить товар
        </button>
      </header>

      <div id="dbAlert" class="admin-alert hidden"></div>

      <div class="admin-table-container">
        <table class="admin-table">
          <thead>
            <tr>
              <th>Фото</th>
              <th>Название</th>
              <th>Бренд</th>
              <th>Тип</th>
              <th>Какао</th>
              <th>Цена</th>
              <th>Действия</th>
            </tr>
          </thead>
          <tbody id="productsTableBody">
            <tr><td colspan="7" style="text-align:center">Загрузка...</td></tr>
          </tbody>
        </table>
      </div>
    </main>
  </div>

  <div class="admin-modal" id="productModal">
    <div class="admin-modal-content">
      <div class="admin-modal-header">
        <h3 id="modalTitle">Добавить товар</h3>
        <button class="admin-modal-close" type="button" onclick="closeModal()">&times;</button>
      </div>
      <div class="admin-modal-body">
        <form id="productForm" onsubmit="event.preventDefault(); submitProductForm();">
          <div class="admin-form-group">
            <label>Название *</label>
            <input type="text" id="productName" class="admin-form-control" required>
          </div>
          <div class="admin-form-row">
            <div class="admin-form-group">
              <label>Бренд (id)</label>
              <input type="text" id="productBrand" class="admin-form-control" placeholder="milka">
            </div>
            <div class="admin-form-group">
              <label>Название бренда</label>
              <input type="text" id="productBrandName" class="admin-form-control" placeholder="Milka">
            </div>
          </div>
          <div class="admin-form-row">
            <div class="admin-form-group">
              <label>Тип</label>
              <select id="productType" class="admin-form-control">
                <option value="milk">Молочный</option>
                <option value="dark">Тёмный</option>
                <option value="white">Белый</option>
                <option value="ruby">Рубиновый</option>
              </select>
            </div>
            <div class="admin-form-group">
              <label>% какао</label>
              <input type="number" id="productCacao" class="admin-form-control" value="30">
            </div>
            <div class="admin-form-group">
              <label>Цена (сом)</label>
              <input type="number" id="productPrice" class="admin-form-control" required>
            </div>
          </div>
          <div class="admin-form-group">
            <label>Вкус</label>
            <input type="text" id="productFlavor" class="admin-form-control" placeholder="hazelnut">
          </div>
          <div class="admin-form-group">
            <label>Описание</label>
            <textarea id="productDesc" class="admin-form-control" rows="3"></textarea>
          </div>
          <div class="admin-form-group">
            <label>URL изображения</label>
            <input type="url" id="productImage" class="admin-form-control" placeholder="https://...">
          </div>
          <div class="admin-form-group">
            <label><input type="checkbox" id="productHit"> Хит продаж</label>
          </div>
          <input type="hidden" id="editId" value="">
        </form>
      </div>
      <div class="admin-modal-footer">
        <button class="btn btn-outline" type="button" onclick="closeModal()">Отмена</button>
        <button class="btn btn-primary" type="button" onclick="submitProductForm()">Сохранить</button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="../js/config.js"></script>
  <script src="../js/supabase-client.js"></script>
  <script src="products.js"></script>
</body>
</html>
